version: '3.8'

services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: operational_brain_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: operational_brain
    volumes:
      - mongodb_data:/data/db
    networks:
      - operational_brain_network

volumes:
  mongodb_data:

networks:
  operational_brain_network:
    driver: bridge
